<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Guiding Light lighthouse mark">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" stroke="#9B7722" stroke-width="1.25"/>

  <!-- Tower -->
  <path d="M19 36 L19 21 L29 21 L29 36 Z" fill="#9B7722"/>

  <!-- Gallery (thin horizontal detail at tower top) -->
  <rect x="18" y="20" width="12" height="1.2" fill="#9B7722"/>

  <!-- Lantern cabin -->
  <rect x="20" y="15" width="8" height="5" fill="#9B7722"/>

  <!-- Cap / roof -->
  <path d="M19.5 15 L24 11 L28.5 15 Z" fill="#9B7722"/>

  <!-- Finial -->
  <line x1="24" y1="11" x2="24" y2="9" stroke="#9B7722" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Guiding light (bright honey) -->
  <circle cx="24" cy="17.5" r="1.8" fill="#EECD97"/>

  <!-- Beams -->
  <line x1="5" y1="17.5" x2="17" y2="17.5" stroke="#EECD97" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="31" y1="17.5" x2="43" y2="17.5" stroke="#EECD97" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Water line -->
  <path d="M10 37 Q14 35.8 18 37 T26 37 T34 37 T38 37" stroke="#9B7722" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
