backend:
  name: git-gateway
  branch: main

# Where Decap stores uploaded images (client uses the "Media" button in the editor)
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Friendly branding
site_url: https://guidinglightnc.com
display_url: https://guidinglightnc.com
logo_url: /assets/hero-worship.jpg

collections:
  - name: events
    label: "Events"
    description: "Add or edit events. Click Publish to save."
    editor:
      preview: false
    files:
      - file: "content/events.json"
        label: "Open events list"
        name: "events_file"
        format: "json"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date_display}}"
            label_singular: "Event"
            add_to_top: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Date"
                name: "date_display"
                widget: "string"
                hint: "e.g. May 4–8, 2026 · Nightly 7 PM"
              - label: "Category"
                name: "category"
                widget: "select"
                default: "General"
                options:
                  - "Revival"
                  - "Community"
                  - "Youth"
                  - "Children"
                  - "Christmas"
                  - "Easter"
                  - "Thanksgiving"
                  - "Women"
                  - "Men"
                  - "General"
                hint: "Color tone for the card (used when no image is uploaded)."
              - label: "Description"
                name: "description"
                widget: "text"
                hint: "2–3 sentences."
              - label: "Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Optional. If blank, the card uses the category color."
              - label: "Featured"
                name: "featured"
                widget: "boolean"
                default: false
                hint: "Shows on the homepage 'Upcoming' section."
              - label: "Link text"
                name: "link_text"
                widget: "string"
                required: false
                hint: "Optional. e.g. 'Register', 'Sign up'."
              - label: "Link URL"
                name: "link_url"
                widget: "string"
                required: false
                hint: "Optional. Where the link goes (e.g. contact.html or a full URL)."
